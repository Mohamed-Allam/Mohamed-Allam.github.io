<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Check-in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding: 1rem;
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .container {
      max-width: 100%;
      background-color: white;
      padding: 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    .question-block {
      margin-bottom: 2rem;
    }
    .diet-button {
      width: 100%;
      margin-bottom: 10px;
      transition: all 0.3s ease;
      font-size: 1rem;
      padding: 0.75rem;
    }
    .diet-button.clicked {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
    }
    .hidden {
      display: none !important;
    }
    textarea.form-control {
      font-size: 0.95rem;
    }
    @media (max-width: 576px) {
      h5 {
        font-size: 1.05rem;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="container text-center">
    <h3 class="mb-4">Daily Spiritual Check-In</h3>

    <div id="questions"></div>

    <button id="submitBtn" class="btn btn-primary btn-lg mt-3">Submit</button>

    <div id="thankYou" class="mt-4 hidden">
      <h4>✅ Thank you for completing your check-in!</h4>
      <p>You will be redirected shortly...</p>
    </div>
  </div>

  <script>
    const questions = [
      {
        text: "When we retire at night, we constructively review our day. Were we resentful?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "Describe if needed..."
      },
      {
        text: "Were we selfish?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "Describe if needed..."
      },
      {
        text: "Were we dishonest?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "Describe if needed..."
      },
      {
        text: "Were we afraid?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "Describe if needed..."
      },
      {
        text: "Do we owe an apology?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "Who do you need to apologize to?"
      },
      {
        text: "Have we kept something to ourselves which should be discussed with another person at once?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "Describe if needed..."
      },
      {
        text: "Were we kind and loving toward all?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: false,
        textHint: "This text is hidden while enableTextHint is false."
      },
      {
        text: "What could we have done better?",
        yesLabel: "I reflected on this",
        noLabel: "Not yet",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "Write your reflection..."
      },
      // Personal questions
      {
        text: "Were you aware that life and everything which is happening is just a temporary phase in your existence and not the final destination?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "Describe if needed..."
      },
      {
        text: "Are you Running After life or walking towards God? Are you inside the movie called life or watching it?",
        yesLabel: "Walking towards God",
        noLabel: "Running After life",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "Describe your experience today..."
      },
      {
        text: "Are you living a spiritual life by acting according to spiritual principles?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: false,
        enableTextHint: false,
        textHint: ""
      },
      {
        text: "Did you anchor yourself today through the ACE? When?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "When did you practice it?"
      },
      {
        text: "Did you meditate today?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: false,
        enableTextHint: false,
        textHint: ""
      },
      {
        text: "Were you aware that control is just an illusion today? Where did you practice control? ",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "Control is defined as output attachment"
      },
      {
        text: "Did you spend five minutes speaking to God this morning?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: false,
        enableTextHint: false,
        textHint: ""
      },
      {
        text: "Did you drink only two cups of coffee today?",
        yesLabel: "Yes",
        noLabel: "No",
        enableTextarea: true,
        enableTextHint: true,
        textHint: "How many cups did you have?"
      }
    ];

    const container = document.getElementById("questions");

    const escapeHTML = (value) => String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    questions.forEach((q, i) => {
      const id = `q${i}`;
      const block = document.createElement("div");
      block.className = "question-block";

      // These defaults keep older questions working if the new fields are omitted.
      const yesLabel = q.yesLabel ?? "Yes";
      const noLabel = q.noLabel ?? "No";
      const textHint = q.enableTextHint !== false ? (q.textHint ?? "Describe if needed...") : "";
      const textareaHTML = q.enableTextarea
        ? `<textarea class="form-control" rows="3" placeholder="${escapeHTML(textHint)}"></textarea>`
        : "";

      block.innerHTML = `
        <h5>${i + 1}. ${escapeHTML(q.text)}</h5>
        <button id="${id}Yes" class="btn btn-outline-success diet-button">${escapeHTML(yesLabel)}</button>
        <button id="${id}No" class="btn btn-outline-danger diet-button">${escapeHTML(noLabel)}</button>
        ${textareaHTML}
      `;
      container.appendChild(block);

      const yesBtn = block.querySelector(`#${id}Yes`);
      const noBtn = block.querySelector(`#${id}No`);

      yesBtn.addEventListener("click", () => {
        yesBtn.classList.remove("btn-outline-success");
        yesBtn.classList.add("btn-success", "clicked");
        noBtn.classList.add("hidden");
      });

      noBtn.addEventListener("click", () => {
        noBtn.classList.remove("btn-outline-danger");
        noBtn.classList.add("btn-danger", "clicked");
        yesBtn.classList.add("hidden");
      });
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      document.getElementById("questions").classList.add("hidden");
      document.getElementById("submitBtn").classList.add("hidden");
      document.getElementById("thankYou").classList.remove("hidden");

      setTimeout(() => {
        window.location.href = "https://www.google.com";
      }, 5000);
    });
  </script>
</body>
</html>
